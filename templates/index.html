<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کمپرسور آنلاین PDF</title>
    <!-- استفاده از Tailwind CSS برای طراحی زیبا -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <!-- هدر -->
    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">کاهش حجم PDF</h1>
            <span class="text-sm text-gray-500">ابزار ساده و سریع</span>
        </div>
    </header>

    <!-- محتوای اصلی -->
    <main class="container mx-auto px-4 py-12 flex-grow max-w-2xl">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-100">
            <h2 class="text-2xl font-bold text-center mb-2">فشرده‌سازی فایل PDF</h2>
            <p class="text-gray-500 text-center mb-8 text-sm">فایل خود را بکشید و رها کنید یا دکمه انتخاب فایل را بزنید.</p>

            <!-- فرم آپلود -->
            <form id="uploadForm" class="space-y-6">
                <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 transition-colors bg-gray-50">
                    <input type="file" id="fileInput" name="file" accept=".pdf" class="hidden">
                    <div class="space-y-3">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="text-sm text-gray-600" id="fileStatus">انتخاب فایل PDF</p>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition duration-200 hidden">
                    شروع فشرده‌سازی
                </button>
            </form>

            <!-- بخش لودینگ و وضعیت -->
            <div id="statusSection" class="mt-8 hidden">
                <div class="flex items-center justify-center space-x-2 space-x-reverse" id="loadingSpinner">
                    <div class="w-4 h-4 bg-blue-600 rounded-full animate-bounce"></div>
                    <div class="w-4 h-4 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-4 h-4 bg-blue-600 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                    <span class="text-sm text-gray-600 mr-2">در حال پردازش و فشرده‌سازی...</span>
                </div>

                <!-- نتیجه موفقیت‌آمیز -->
                <div id="resultBox" class="hidden border border-green-200 bg-green-50 rounded-xl p-6 text-center space-y-4">
                    <p class="text-green-800 font-semibold">عملیات با موفقیت انجام شد!</p>
                    <div class="grid grid-cols-3 gap-2 text-xs text-gray-600 bg-white p-3 rounded-lg border border-green-100">
                        <div>
                            <span class="block text-gray-400">حجم اولیه</span>
                            <span id="origSize" class="font-bold"></span>
                        </div>
                        <div>
                            <span class="block text-gray-400">حجم نهایی</span>
                            <span id="compSize" class="font-bold text-green-600"></span>
                        </div>
                        <div>
                            <span class="block text-gray-400">کاهش</span>
                            <span id="reduction" class="font-bold text-blue-600"></span>
                        </div>
                    </div>
                    <a id="downloadLink" href="#" class="inline-block bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm transition-colors">
                        دانلود فایل فشرده‌شده
                    </a>
                </div>

                <!-- خطا -->
                <div id="errorBox" class="hidden text-red-600 text-sm text-center p-4 bg-red-50 rounded-xl border border-red-100"></div>
            </div>
        </div>
    </main>

    <!-- فوتر -->
    <footer class="text-center py-6 text-xs text-gray-400 bg-white border-t border-gray-100">
        <p>ساخته شده با پایتون و فلاسک</p>
    </footer>

    <!-- کدهای جاوااسکریپت برای تعامل با بک‌اند -->
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileStatus = document.getElementById('fileStatus');
        const submitBtn = document.getElementById('submitBtn');
        const statusSection = document.getElementById('statusSection');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultBox = document.getElementById('resultBox');
        const errorBox = document.getElementById('errorBox');
        const uploadForm = document.getElementById('uploadForm');

        // مدیریت درگ و دراپ فایل
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelection();
            }
        });

        fileInput.addEventListener('change', handleFileSelection);

        function handleFileSelection() {
            const file = fileInput.files[0];
            if (file) {
                if (file.type !== "application/pdf" && !file.name.endsWith('.pdf')) {
                    alert('لطفاً فقط فایل PDF انتخاب کنید.');
                    fileInput.value = '';
                    return;
                }
                fileStatus.innerText = `فایل انتخاب شده: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
                submitBtn.classList.remove('hidden');
            }
        }

        // ارسال فرم به صورت ایجکس (AJAX)
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // نمایش حالت بارگذاری
            statusSection.classList.remove('hidden');
            loadingSpinner.classList.remove('hidden');
            resultBox.classList.add('hidden');
            errorBox.classList.add('hidden');
            submitBtn.setAttribute('disabled', 'true');

            try {
                const response = await fetch('/compress', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                loadingSpinner.classList.add('hidden');

                if (response.ok && data.success) {
                    resultBox.classList.remove('hidden');
                    document.getElementById('origSize').innerText = data.original_size;
                    document.getElementById('compSize').innerText = data.compressed_size;
                    document.getElementById('reduction').innerText = data.reduction;
                    document.getElementById('downloadLink').href = data.download_url;
                } else {
                    errorBox.classList.remove('hidden');
                    errorBox.innerText = data.error || 'خطایی در فشرده‌سازی رخ داد.';
                }
            } catch (err) {
                loadingSpinner.classList.add('hidden');
                errorBox.classList.remove('hidden');
                errorBox.innerText = 'ارتباط با سرور برقرار نشد.';
            } finally {
                submitBtn.removeAttribute('disabled');
            }
        });
    </script>
</body>
</html>
